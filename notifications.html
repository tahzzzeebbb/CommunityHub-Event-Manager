<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications - Community Event Manager</title>
  <link rel="stylesheet" href="css/notifications.css" />
</head>
<body>
  <div class="notifications-container">
    <header>
      <h1>Notifications</h1>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </header>

    <section class="notifications-list">
      <!-- Example notification -->
      <article class="notification unread">
        <p><strong>Reminder:</strong> You have RSVP’d for "Community Hackathon" happening tomorrow.</p>
        <span class="timestamp">May 15, 2025 - 09:00 AM</span>
      </article>

      <article class="notification">
        <p><strong>Update:</strong> The location for "Monthly Meetup" has changed to Conference Room B.</p>
        <span class="timestamp">May 14, 2025 - 06:30 PM</span>
      </article>

      <!-- More notifications populated dynamically -->
    </section>
  </div>
</body>
</html>
