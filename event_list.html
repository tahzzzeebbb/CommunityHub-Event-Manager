<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upcoming Events</title>
  <link rel="stylesheet" href="css/event_list.css" />
</head>
<body>
  <div class="event-list-container">
    <h2>Upcoming Events</h2>
    <div id="events">Loading events...</div>
  </div>

  <script>
    async function loadEvents() {
      try {
        const res = await fetch('modules/events/list.php', { credentials: 'include' });
        const data = await res.json();

        const container = document.getElementById('events');
        if (!res.ok) {
          container.textContent = data.error || 'Failed to load events.';
          return;
        }

        if (!data.events || data.events.length === 0) {
          container.textContent = 'No upcoming events.';
          return;
        }

        container.innerHTML = '';

        data.events.forEach(event => {
          const div = document.createElement('div');
          div.className = 'event-item';

          div.innerHTML = `
            <h3>${escapeHtml(event.title)}</h3>
            <p>${escapeHtml(event.description)}</p>
            <p><strong>Date & Time:</strong> ${new Date(event.event_datetime).toLocaleString()}</p>
            <p><strong>Location:</strong> ${escapeHtml(event.location)}</p>
            <p><strong>Capacity:</strong> ${event.capacity}</p>
            <button data-id="${event.id}" class="rsvp-btn">RSVP</button>
          `;

          container.appendChild(div);
        });

        document.querySelectorAll('.rsvp-btn').forEach(button => {
          button.addEventListener('click', () => {
            rsvpEvent(button.dataset.id);
          });
        });
      } catch (error) {
        document.getElementById('events').textContent = 'Network error loading events.';
      }
    }

    async function rsvpEvent(eventId) {
      try {
        const res = await fetch('modules/events/rsvp.php', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ event_id: eventId }),
        });

        const data = await res.json();

        if (res.ok) {
          alert('RSVP successful!');
          loadEvents();
        } else {
          alert('Error: ' + (data.error || 'Could not RSVP.'));
        }
      } catch {
        alert('Network error.');
      }
    }

    // Basic HTML escaping to avoid injection
    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (m) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[m]);
    }

    loadEvents();
  </script>
</body>
</html>
