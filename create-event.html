<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Event - Community Event Manager</title>
  <link rel="stylesheet" href="css/create-event.css" />
</head>
<body>
  <div class="create-event-container">
    <header>
      <h1>Create New Event</h1>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </header>

    <form action="/modules/events/create.php" method="POST" class="event-form">
      <label for="title">Event Title</label>
      <input type="text" name="title" id="title" required />

      <label for="date">Date</label>
      <input type="date" name="date" id="date" required />

      <label for="time">Time</label>
      <input type="time" name="time" id="time" required />

      <label for="location">Location</label>
      <input type="text" name="location" id="location" required />

      <label for="description">Description</label>
      <textarea name="description" id="description" rows="5" required></textarea>

      <button type="submit">Create Event</button>
    </form>
  </div>
</body>
</html>
