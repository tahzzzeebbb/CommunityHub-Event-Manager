<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Events - Community Event Manager</title>
  <link rel="stylesheet" href="css/events.css" />
</head>
<body>
  <div class="events-container">
    <header>
      <h1>Upcoming Events</h1>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </header>

    <section class="event-list">
      <!-- Example event card -->
      <article class="event-card">
        <div class="event-info">
          <h2>Community Hackathon</h2>
          <p><strong>Date:</strong> 2025-06-10</p>
          <p><strong>Location:</strong> Community Hall</p>
          <p>Join us for a 48-hour coding marathon with prizes!</p>
        </div>
        <div class="event-actions">
          <button class="rsvp-btn">RSVP</button>
          <button class="edit-btn">Edit</button> <!-- Show only for organizers -->
        </div>
      </article>

      <!-- Add more event cards dynamically in backend -->
    </section>
  </div>
</body>
</html>
